<div class="admin-floating-badge">

<section class="page">
  <div class="admin-mode-banner">
    <div>
      <div class="admin-mode-banner__title">
        מצב מנהל
      </div>

      <div class="admin-mode-banner__text">
        אתה עורך כעת את המוצרים של משתמש מספר {{ userId() }} - {{ userName() || '-' }}
      </div>
    </div>

    <a routerLink="/admin/users" class="btn btn-secondary">
      חזרה לכל המשתמשים
    </a>
  </div>

  <h1 class="page-title">המוצרים שלי</h1>

  @if (isLoading()) {
    <div class="card">
      טוען מוצרים...
    </div>
  } @else {
    @if (errorMessage()) {
      <div class="error-message">
        {{ errorMessage() }}
      </div>
    }

    <app-products-table
      [title]="getTableTitle()"
      [products]="products()"
      (favoriteChanged)="toggleFavorite($event.product, $event.isFavorite)"
    />
  }
</section>
