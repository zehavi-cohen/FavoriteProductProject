<section class="page">
  <h1 class="page-title">המוצרים שלי</h1>

  @if (isLoading()) {
    <div class="card">
      טוען מוצרים...
    </div>
  } @else {
    @if (errorMessage()) {
      <div class="error-message">
        {{ errorMessage() }}
      </div>
    }

    <app-products-table
      [title]="getTableTitle()"
      [products]="products()"
      (favoriteChanged)="toggleFavorite($event.product, $event.isFavorite)"
    />
  }
</section>
