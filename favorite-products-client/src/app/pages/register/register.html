<section class="page">
  <div class="card form-card">
    <h1 class="form-title">הרשמה</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <app-form-input
        label="שם משתמש"
        autocomplete="username"
        formControlName="userName"
        errorText="שדה חובה"
      />

      <app-form-input
        label="אימייל"
        type="email"
        autocomplete="email"
        formControlName="email"
        errorText="יש להזין אימייל תקין"
      />

      <app-form-input
        label="סיסמה"
        type="password"
        autocomplete="new-password"
        formControlName="password"
        errorText="שדה חובה"
      />

      @if (errorMessage()) {
        <div class="error-message">
          {{ errorMessage() }}
        </div>
      }

      <div class="actions">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            נרשם...
          } @else {
            הרשמה
          }
        </button>

        <a routerLink="/login">כבר יש לך משתמש? כניסה</a>
      </div>
    </form>
  </div>
</section>
